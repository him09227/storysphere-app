<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>StorySphere App</title>

<link
href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

body{
  margin:0;
  background:#070816;
  color:white;
  font-family:'Syne',sans-serif;
}

.topbar{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
  font-size:1.2rem;
  font-weight:800;
}

.points{
  color:#00e5ff;
  font-weight:700;
}

.container{
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:24px;
  padding:24px;
  margin-bottom:20px;
}

.card h3{
  margin-top:0;
}

.gm-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  background:
  linear-gradient(
  135deg,
  #7b2fff,
  #00e5ff
  );
  color:white;
  font-size:1rem;
  font-weight:700;
}

.quest{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:14px;
  padding:14px;
  border-radius:16px;
  background:rgba(255,255,255,0.03);
}

.swap-box{
  display:grid;
  gap:12px;
}

input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  color:white;
}

.swap-btn{
  padding:16px;
  border:none;
  border-radius:16px;
  background:#00e5ff;
  color:black;
  font-weight:700;
}

</style>

</head>

<body>

<div class="topbar">

  <div class="logo">
    StorySphere
  </div>

  <div class="points">
    12,840 XP
  </div>

</div>

<div class="container">

  <div class="card">

    <h3>
      ☀️ Daily GM
    </h3>

    <p>
      Maintain 10 day streak and earn rewards.
    </p>

    <button class="gm-btn">
      Claim GM
    </button>

  </div>

  <div class="card">

    <h3>
      🤝 Ecosystem Quests
    </h3>

    <div class="quest">
      <span>
        Follow Partner X
      </span>

      <span>
        +50 XP
      </span>
    </div>

    <div class="quest">
      <span>
        Join Discord
      </span>

      <span>
        +30 XP
      </span>
    </div>

    <div class="quest">
      <span>
        Complete Swap
      </span>

      <span>
        +120 XP
      </span>
    </div>

  </div>

  <div class="card">

    <h3>
      🔄 Swap
    </h3>

    <div class="swap-box">

      <input
      placeholder="USDC"
      />

      <input
      placeholder="STORY"
      />

      <button class="swap-btn">
        Swap Tokens
      </button>

    </div>

  </div>

</div>

</body>
</html>
