<script>

const gmBtn = document.querySelector(".gm-btn");

const xp = document.getElementById("xp");

let points =
localStorage.getItem("points")
? Number(localStorage.getItem("points"))
: 12840;

let claimed =
localStorage.getItem("claimed")
=== "true";

xp.innerHTML = points + " XP";

if(claimed){

  gmBtn.innerHTML = "Already Claimed ☀️";

  gmBtn.style.opacity = "0.7";

}

gmBtn.addEventListener("click", () => {

  if(claimed) return;

  claimed = true;

  points += 80;

  localStorage.setItem("points", points);

  localStorage.setItem("claimed", true);

  xp.innerHTML = points + " XP";

  gmBtn.innerHTML = "Already Claimed ☀️";

  gmBtn.style.opacity = "0.7";

});

</script>
